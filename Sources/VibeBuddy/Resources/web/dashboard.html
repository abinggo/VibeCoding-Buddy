<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/nes.min.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <div class="dashboard">
        <h2 class="nes-text is-primary">Vibe Buddy Dashboard</h2>

        <div class="stats-row">
            <div class="nes-container is-dark with-title">
                <p class="title">Sessions</p>
                <p class="big-number" id="total-sessions">-</p>
            </div>
            <div class="nes-container is-dark with-title">
                <p class="title">Messages</p>
                <p class="big-number" id="total-messages">-</p>
            </div>
            <div class="nes-container is-dark with-title">
                <p class="title">Tokens</p>
                <p class="big-number" id="total-tokens">-</p>
            </div>
        </div>

        <div class="chart-section nes-container is-dark with-title">
            <p class="title">Activity (7 days)</p>
            <canvas id="activity-chart" width="600" height="200"></canvas>
        </div>

        <div class="chart-section nes-container is-dark with-title">
            <p class="title">Token Usage (7 days)</p>
            <canvas id="token-chart" width="600" height="200"></canvas>
        </div>

        <div class="theme-section">
            <label>
                Theme:
                <select id="theme-select" class="nes-select is-dark">
                    <option value="office-human">Office Human</option>
                    <option value="pixel-pets">Pixel Pets</option>
                    <option value="pixel-robots">Pixel Robots</option>
                </select>
            </label>
        </div>
    </div>

    <script src="js/bridge.js"></script>
    <script src="js/dashboard-app.js"></script>
</body>
</html>
